version: "3"

services:
  generate:
    build: ./
    command: python -m scripts.generate -c /configs/docker.json
    volumes:
      - ./models:/models
      - ./configs:/configs
      - ./core:/app/core
      - ./scripts:/app/scripts
      - ./outputs:/outputs
    environment:
      - DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  webui:
    build: ./
    command: python -m scripts.webui --listen
    ports:
      - "2345:2345"
    volumes:
      - ./models:/models
      - ./configs:/configs
      - ./core:/app/core
      - ./scripts:/app/scripts
      - /mars/output/VQGAN-CLIP:/mars/output/VQGAN-CLIP
      - /mars/input/VQGAN-CLIP:/mars/input/VQGAN-CLIP
    environment:
      - DEVICE=cuda
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  train:
    build: ./
    command: python -m scripts.train -c /configs/models/vqgan_custom_docker.json
    volumes:
      - ./models:/models
      - ./configs:/configs
      - ./core:/app/core
      - ./scripts:/app/scripts
      - ./outputs:/outputs
    environment:
      - DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
